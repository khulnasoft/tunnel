project_name: khulnasoft
builds:
  -
    main: cmd/khulnasoft/main.go
    binary: khulnasoft
    ldflags:
      - -s -w
      - "-extldflags '-static'"
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - freebsd
    goarch:
      - amd64
      - 386
      - arm
      - arm64
      - s390x
      - ppc64le
    goarm:
      - 7
    ignore:
      - goos: darwin
        goarch: 386
      # modernc.org/sqlite doesn't support the following pairs
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64

release:
    extra_files:
      - glob: ./bom.json
    discussion_category_name: Announcements

nfpms:
  -
    formats:
      - deb
      - rpm
    vendor: "khulnasoft"
    homepage: "https://github.com/khulnasoft"
    maintainer: "Md Sulaiman <infosulaimanbd@gmail.com>"
    description: "A Fast Vulnerability Scanner for Containers"
    license: "Apache-2.0"
    file_name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}-{{.Arch}}"
    replacements:
      amd64: 64bit
      386: 32bit
      arm: ARM
      arm64: ARM64
      ppc64le: PPC64LE
      darwin: macOS
      linux: Linux
      openbsd: OpenBSD
      netbsd: NetBSD
      freebsd: FreeBSD
      dragonfly: DragonFlyBSD
    contents:
     - src: contrib/*.tpl
       dst: /usr/local/share/khulnasoft/templates

archives:
  -
    format: tar.gz
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}-{{.Arch}}"
    replacements:
      amd64: 64bit
      386: 32bit
      arm: ARM
      arm64: ARM64
      ppc64le: PPC64LE
      darwin: macOS
      linux: Linux
      openbsd: OpenBSD
      netbsd: NetBSD
      freebsd: FreeBSD
      dragonfly: DragonFlyBSD
    files:
      - README.md
      - LICENSE
      - contrib/*.tpl


brews:
  -
    tap:
      owner: khulnasoft
      name: homebrew-khulnasoft
    homepage: "https://github.com/khulnasoft/khulnasoft"
    description: "Scanner for vulnerabilities in container images, file systems, and Git repositories, as well as for configuration issues"
    test: |
      system "#{bin}/khulnasoft", "--version"

dockers:
  - image_templates:
      - "docker.io/khulnasoft/khulnasoft:{{ .Version }}-amd64"
      - "docker.io/khulnasoft/khulnasoft:latest-amd64"
      - "ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-amd64"
      - "ghcr.io/khulnasoft/khulnasoft:latest-amd64"
      - "public.ecr.aws/khulnasoft/khulnasoft:latest-amd64"
      - "public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    ids:
      - khulnasoft
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A Fast Vulnerability Scanner for Containers"
      - "--label=org.opencontainers.image.vendor=Khulnasoft Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/khulnasoft/khulnasoft"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://www.khulnasoft.com/products/khulnasoft/"
      - "--label=org.opencontainers.image.documentation=https://khulnasoft.github.io/khulnasoft/v{{ .Version }}/"
      - "--platform=linux/amd64"
    extra_files:
    - contrib/
  - image_templates:
      - "docker.io/khulnasoft/khulnasoft:{{ .Version }}-arm64"
      - "docker.io/khulnasoft/khulnasoft:latest-arm64"
      - "ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-arm64"
      - "ghcr.io/khulnasoft/khulnasoft:latest-arm64"
      - "public.ecr.aws/khulnasoft/khulnasoft:latest-arm64"
      - "public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    ids:
      - khulnasoft
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A Fast Vulnerability Scanner for Containers"
      - "--label=org.opencontainers.image.vendor=Khulnasoft Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/khulnasoft/khulnasoft"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://www.khulnasoft.com/products/khulnasoft/"
      - "--label=org.opencontainers.image.documentation=https://khulnasoft.github.io/khulnasoft/v{{ .Version }}/"
      - "--platform=linux/arm64"
    extra_files:
    - contrib/
  - image_templates:
      - "docker.io/khulnasoft/khulnasoft:{{ .Version }}-s390x"
      - "docker.io/khulnasoft/khulnasoft:latest-s390x"
      - "ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-s390x"
      - "ghcr.io/khulnasoft/khulnasoft:latest-s390x"
      - "public.ecr.aws/khulnasoft/khulnasoft:latest-s390x"
      - "public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-s390x"
    use: buildx
    goos: linux
    goarch: s390x
    ids:
      - khulnasoft
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A Fast Vulnerability Scanner for Containers"
      - "--label=org.opencontainers.image.vendor=Khulnasoft Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/khulnasoft/khulnasoft"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://www.khulnasoft.com/products/khulnasoft/"
      - "--label=org.opencontainers.image.documentation=https://khulnasoft.github.io/khulnasoft/v{{ .Version }}/"
      - "--platform=linux/s390x"
    extra_files:
    - contrib/
  - image_templates:
      - "docker.io/khulnasoft/khulnasoft:{{ .Version }}-ppc64le"
      - "docker.io/khulnasoft/khulnasoft:latest-ppc64le"
      - "ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-ppc64le"
      - "ghcr.io/khulnasoft/khulnasoft:latest-ppc64le"
      - "public.ecr.aws/khulnasoft/khulnasoft:latest-ppc64le"
      - "public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-ppc64le"
    use: buildx
    goos: linux
    goarch: ppc64le
    ids:
      - khulnasoft
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=A Fast Vulnerability Scanner for Containers"
      - "--label=org.opencontainers.image.vendor=Khulnasoft Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/khulnasoft/khulnasoft"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://www.khulnasoft.com/products/khulnasoft/"
      - "--label=org.opencontainers.image.documentation=https://khulnasoft.github.io/khulnasoft/v{{ .Version }}/"
      - "--platform=linux/ppc64le"
    extra_files:
    - contrib/

docker_manifests:
  - name_template: 'khulnasoft/khulnasoft:{{ .Version }}'
    image_templates:
    - 'khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'khulnasoft/khulnasoft:{{ .Version }}-ppc64le'
  - name_template: 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}'
    image_templates:
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-ppc64le'
  - name_template: 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}'
    image_templates:
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-ppc64le'
  - name_template: 'khulnasoft/khulnasoft:latest'
    image_templates:
    - 'khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'khulnasoft/khulnasoft:{{ .Version }}-ppc64le'
  - name_template: 'ghcr.io/khulnasoft/khulnasoft:latest'
    image_templates:
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'ghcr.io/khulnasoft/khulnasoft:{{ .Version }}-ppc64le'
  - name_template: 'public.ecr.aws/khulnasoft/khulnasoft:latest'
    image_templates:
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-amd64'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-arm64'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-s390x'
    - 'public.ecr.aws/khulnasoft/khulnasoft:{{ .Version }}-ppc64le'

signs:
- cmd: cosign
  env:
  - COSIGN_EXPERIMENTAL=1
  signature: "${artifact}.sig"
  certificate: "${artifact}.pem"
  args:
    - "sign-blob"
    - "--oidc-issuer=https://token.actions.githubusercontent.com"
    - "--output-certificate=${certificate}"
    - "--output-signature=${signature}"
    - "${artifact}"
  artifacts: all
  output: true

docker_signs:
- cmd: cosign
  env:
  - COSIGN_EXPERIMENTAL=1
  artifacts: manifests
  output: true
  args:
  - 'sign'
  - '${artifact}'